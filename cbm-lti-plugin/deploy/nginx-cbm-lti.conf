# Nginx config for CBM LTI Plugin
# Use this if running standalone nginx instead of Nginx Proxy Manager.
# For NPM, configure via the web UI (see DEPLOY.md).

# Option A: Path prefix on simonmccallum.org.nz
location /cbm-quiz/ {
    proxy_pass http://localhost:3001/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # LTI needs longer timeouts (quiz analysis can take minutes)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # File uploads up to 50MB
    client_max_body_size 50M;
}

