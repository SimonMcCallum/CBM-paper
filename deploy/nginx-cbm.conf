# Nginx configuration for CBM Benchmark Dashboard
#
# Install:
#   sudo cp deploy/nginx-cbm.conf /etc/nginx/sites-available/cbm-benchmark
#   sudo ln -s /etc/nginx/sites-available/cbm-benchmark /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # Change to your domain, e.g. cbm.example.com

    root /home/simon/public;
    index index.html;

    # Vue SPA with hash routing - just serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache JSON data (shorter TTL so updates propagate)
    location /data/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
